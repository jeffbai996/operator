<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Tab</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: #0d0e11;
    color: #e7ecf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1.4rem;
  }
  .mark { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; opacity: 0.92; }
  .mark .dot { color: #3fb950; }
  form { width: min(560px, 82vw); }
  .search {
    display: flex; align-items: center; gap: 0.6rem;
    background: #15171b; border: 1px solid #282a30; border-radius: 999px;
    padding: 0.7rem 1.1rem;
  }
  .search:focus-within { border-color: #3a3d45; }
  .search svg { flex: 0 0 auto; opacity: 0.5; }
  input {
    flex: 1; background: transparent; border: 0; outline: 0;
    color: #e7ecf3; font-size: 1rem; font-family: inherit;
  }
  input::placeholder { color: #79828d; }
  .hint { color: #79828d; font-size: 0.82rem; }
</style>
</head>
<body>
  <div class="mark">Operator<span class="dot">.</span></div>
  <form onsubmit="var q=document.getElementById('q').value.trim(); if(q){location.href='https://duckduckgo.com/?q='+encodeURIComponent(q);} return false;">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" autofocus placeholder="Search the web or type a URL…" autocomplete="off">
    </div>
  </form>
  <div class="hint">Type a task in the chat, or take control and browse.</div>
</body>
</html>
