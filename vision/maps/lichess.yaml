# lichess.yaml — calibrated against a LIVE desktop-sandbox capture (960×768,
# 2026-07-21; verified: perceive's last-move highlight blobs land exactly on
# the expected squares with these rects). The old seed was measured for the
# 1280×800 browser surface and never re-checked in the sandbox — that plus an
# empty template set is why perceive returned zero targets ("lichess harness
# not working", 2026-07-21).
#
# The board grid emits 64 STATIC targets a1..h8 (White at the bottom, the
# lichess default for the White side) — so game_macro can `click_target "e2"`
# then `click_target "e4"` to move, no per-move pixel math. If playing as
# Black (board flipped), the labels mirror: use the flipped: true variant of
# your move logic or address squares by their visual position.
game: lichess
viewport: [960, 768]
regions:
  # main 8x8 board, border to border
  board: [44, 210, 456, 457]
  # right side panel: opponent line, move list, controls, status
  sidebar: [517, 318, 398, 275]
  movelist: [520, 390, 395, 60]
  status: [517, 560, 200, 40]
colors:
  # last-move / selected-square highlight (lichess default green-yellow tint)
  highlight: {lo: [45, 0.25, 0.45], hi: [75, 1.0, 1.0], min_area: 400}
ocr:
  - {label: movelist, region: movelist, min_conf: 40}
  - {label: status, region: status, min_conf: 40}
grids:
  squares:
    region: board
    cols: [a, b, c, d, e, f, g, h]
    rows: ["8", "7", "6", "5", "4", "3", "2", "1"]
    label: "{col}{row}"
templates: {}
